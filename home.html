<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>首页 - 鲍鱼数据分析</title>
    <link href="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.staticfile.org/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.js"></script>
    <style>
        body { background: #f5f6fa; }
        .content-wrapper { margin: 20px 10px; }
        .chart-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 15px; height: 420px; }
        .table-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 15px; }
    </style>
</head>
<body>
<nav class="navbar navbar-default" role="navigation">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">鲍鱼数据分析</a>
        </div>
        <div>
            <ul class="nav navbar-nav" style="font-size:18px;">
                <li class="active"><a href="home.html">主页</a></li>
                <li><a href="abalone.html">查询</a></li>
                <li><a href="pred.html">预测</a></li>
                <li><a href="train.html">训练</a></li>
                <li><a href="dashboard.html">大屏</a></li>
            </ul>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#"><span class="glyphicon glyphicon-user"></span> 欢迎用户：<span id="displayName">用户</span></a></li>
                <li><a href="login.html" id="logoutBtn">退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid content-wrapper">
    <div class="row">
        <div class="col-md-1"></div>
        <div class="col-md-4">
            <div class="chart-box">
                <div id="ageChart" style="height:100%;width:100%;"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="table-box">
                <p style="text-align:center;margin-bottom:15px;">
                    <button type="button" class="btn btn-primary btn-lg" onclick="window.location.href='pred.html'">预测鲍鱼年龄</button>
                </p>
                <table class="table table-striped table-bordered" id="dataTable">
                    <thead>
                        <tr>
                            <th>性别</th><th>长度</th><th>直径</th><th>高度</th>
                            <th>总宽</th><th>剥皮宽度</th><th>内脏宽度</th><th>贝壳宽度</th><th>年龄</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr><td colspan="10" id="pagination"></td></tr></tfoot>
                </table>
            </div>
        </div>
        <div class="col-md-1"></div>
    </div>
</div>

<script>
var sexMap = { '-1': '幼年', '0': '雄性', '1': '雌性' };
var pageSize = 5, curPage = 1, totalItems = 0;

function renderTable() {
    $.getJSON('/api/abalone?page=' + curPage + '&pageSize=' + pageSize, function(res) {
        totalItems = res.total;
        var html = '';
        res.data.forEach(function(r) {
            var sexText = sexMap[r.sex] || r.sex;
            html += '<tr><td>' + sexText + '</td><td>' + r.length + '</td><td>' + r.diameter + '</td><td>' + r.height + '</td>'
                  + '<td>' + r.whole_weight + '</td><td>' + r.shucked_weight + '</td><td>' + r.viscera_weight + '</td><td>' + r.shell_weight + '</td>'
                  + '<td>' + r.rings + '</td>'
                  + '<td><button class="btn btn-danger btn-xs" onclick="window.location.href=\'abalone.html?id=' + r.id + '\'">查询</button></td></tr>';
        });
        $('#tableBody').html(html);

        var pageCnt = Math.ceil(totalItems / pageSize);
        var p = '<ul class="pagination" style="margin:5px 0;">';
        if (curPage > 1) p += '<li><a href="#" onclick="goPage(1)">首页</a></li><li><a href="#" onclick="goPage(' + (curPage - 1) + ')">上一页</a></li>';
        for (var j = Math.max(1, curPage - 2); j <= Math.min(pageCnt, curPage + 2); j++) {
            p += '<li' + (j === curPage ? ' class="active"' : '') + '><a href="#" onclick="goPage(' + j + ')">' + j + '</a></li>';
        }
        if (curPage < pageCnt) p += '<li><a href="#" onclick="goPage(' + (curPage + 1) + ')">下一页</a></li><li><a href="#" onclick="goPage(' + pageCnt + ')">末页</a></li>';
        p += '</ul>';
        $('#pagination').html(p);
    });
}
function goPage(p) { curPage = p; renderTable(); }

var chart = echarts.init(document.getElementById('ageChart'));

function loadAgeChart() {
    $.getJSON('/api/stats', function(stats) {
        var ringData = stats.ringDistribution;
        var x = ringData.map(function(r){return r.rings;});
        var y = ringData.map(function(r){return r.count;});
        chart.setOption({
            title: { text: '鲍鱼年龄分布', left: 'center' },
            tooltip: {},
            xAxis: { type: 'category', data: x, axisLabel: { interval: 0, rotate: 0 } },
            yAxis: { type: 'value' },
            series: [{ name: '数量', type: 'bar', data: y, itemStyle: { color: '#5bc0de' } }]
        });
    });
}

$(function() {
    var name = localStorage.getItem('name') || '用户';
    $('#displayName').text(name);
    renderTable();
    loadAgeChart();
});
</script>
</body>
</html>
